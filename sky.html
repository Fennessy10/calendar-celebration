<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Night Sky</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #050510;
      color: white;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }
    #sky-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    #ui {
      position: relative;
      z-index: 2;
      margin-top: 20px;
    }
    select {
      background: black;
      color: white;
      border: 1px solid white;
      padding: 5px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      outline: none;
      cursor: pointer;
    }
    .pixelated {
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="sky-canvas" class="pixelated"></canvas>
  <div id="ui">
    <select id="month-select"></select>
  </div>
  <script src="sky.js"></script>
</body>
</html>
