<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      background: #202124;
      color: #e8eaed;
      font-family: 'Google Sans', Roboto, sans-serif;
      padding: 15px;
    }
    h3 { margin-top: 0; text-align: center; font-weight: normal; font-size: 16px; margin-bottom: 15px;}
    .option {
      background: #2d2e31;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
    }
    .option:hover { background: #3c4043; }
    
    /* Active State PB */
    .option.active {
      border-color: #38ef7d;
      background: #3c4043;
    }
    
    /* Active State RPG */
    .option.active.rpg {
      border-color: #a855f7; /* Purple */
    }

    .circle {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid #5f6368;
      flex-shrink: 0;
    }
    
    .active .circle {
      background: #38ef7d;
      border-color: #38ef7d;
    }
    .active.rpg .circle {
      background: #a855f7;
      border-color: #a855f7;
    }

    /* Active State Sound Only */
    .option.active.sound {
      border-color: #00d4ff;
      background: #3c4043;
    }

    .active.sound .circle {
      background: #00d4ff;
      border-color: #00d4ff;
    }
    
    .text-container {
        display: flex;
        flex-direction: column;
    }
    .title { font-size: 14px; font-weight: bold; }
    .desc { font-size: 11px; color: #9aa0a6; margin-top: 2px;}

    /* PB Settings Panel */
    .settings-panel {
      background: #2d2e31;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      display: none; /* hidden by default, toggled via JS */
      border: 1px solid rgba(255,255,255,0.05);
    }
    .settings-panel label {
      font-size: 12px; 
      color: #9aa0a6; 
      display: block; 
      margin-bottom: 8px; 
      font-weight: bold;
    }
    .settings-panel select {
      width: 100%;
      background: #202124;
      color: #e8eaed;
      border: 1px solid #5f6368;
      border-radius: 4px;
      padding: 6px;
      outline: none;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .settings-panel select:focus {
      border-color: #38ef7d;
    }
  </style>
</head>
<body>
  <h3>Extension Mode</h3>
  
  <div class="option" id="btn-pb">
    <div class="circle"></div>
    <div class="text-container">
      <div class="title">Daily PB Chaser</div>
      <div class="desc">Reset daily, chase high scores.</div>
    </div>
  </div>

  <div class="option" id="btn-rpg">
    <div class="circle"></div>
    <div class="text-container">
      <div class="title">RPG Level Up</div>
      <div class="desc">Permanent levels, unlock colors.</div>
    </div>
  </div>

  <div class="option" id="btn-sound">
    <div class="circle"></div>
    <div class="text-container">
      <div class="title">Sound Only</div>
      <div class="desc">Just the sounds, no tracking.</div>
    </div>
  </div>

  <div class="settings-panel" id="pb-settings">
    <label for="pb-tier-select">PB Mode Settings</label>
    <select id="pb-tier-select">
      <option value="5">5 Tiers (God-Like at 50)</option>
      <option value="6">6 Tiers (God-Like at 60)</option>
      <option value="7">7 Tiers (God-Like at 70)</option>
    </select>
  </div>

  <script src="popup.js"></script>
</body>
</html>
